steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vedis:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/vedis:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vedis:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vedis:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vedis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vedis:$SHORT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--command'
      - 'node'
      - '--args'
      - 'dist/cli.js,serve'

images:
  - 'gcr.io/$PROJECT_ID/vedis:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/vedis:latest'
